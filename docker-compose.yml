version: "3.9"

services:
  lifeos:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      DB_DRIVER: sqlite
      DATABASE_URL: /app/data/lifeos.db
      NEXT_PUBLIC_PERSISTENCE: server
    volumes:
      - ./data:/app/data
    restart: unless-stopped
